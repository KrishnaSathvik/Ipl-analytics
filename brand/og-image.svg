<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Dark canvas with subtle orange bloom behind the logo -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="6" fill="url(#accent)"/>

  <!-- Logo (centered, 180×180) — build-brand.mjs replaces {{LOGO_SRC}} -->
  <image x="510" y="56" width="180" height="180" xlink:href="{{LOGO_SRC}}" preserveAspectRatio="xMidYMid meet"/>

  <!-- Headline -->
  <text x="600" y="296" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-2.5">IPL ANALYTICS</text>

  <!-- Tagline -->
  <text x="600" y="338" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#a1a1aa" letter-spacing="0.3">Live IPL 2026 · 18 seasons of ball-by-ball cricket data</text>

  <!-- ── Four stat cards ───────────────────────────────────────────── -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- x positions: 120/360/600/840, each card 240 wide -->
    <g transform="translate(240, 412)">
      <text text-anchor="middle" font-size="58" font-weight="900" fill="#f97316" letter-spacing="-2">18</text>
      <text y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#a1a1aa" letter-spacing="1.5">SEASONS OF DATA</text>
    </g>
    <g transform="translate(480, 412)">
      <text text-anchor="middle" font-size="58" font-weight="900" fill="#f97316" letter-spacing="-2">1,169</text>
      <text y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#a1a1aa" letter-spacing="1.5">MATCHES ANALYZED</text>
    </g>
    <g transform="translate(720, 412)">
      <text text-anchor="middle" font-size="58" font-weight="900" fill="#f97316" letter-spacing="-2">1,253</text>
      <text y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#a1a1aa" letter-spacing="1.5">PLAYERS PROFILED</text>
    </g>
    <g transform="translate(960, 412)">
      <text text-anchor="middle" font-size="58" font-weight="900" fill="#f97316" letter-spacing="-2">14,259</text>
      <text y="32" text-anchor="middle" font-size="13" font-weight="700" fill="#a1a1aa" letter-spacing="1.5">SIXES TRACKED</text>
    </g>
  </g>

  <!-- ── Tag pills ─────────────────────────────────────────────────── -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">
    <!-- 4 pills centered: each 136 wide, gap 14, total 586, start at (1200-586)/2 = 307 -->
    <rect x="307" y="495" width="136" height="36" rx="8" fill="#1f1f22" stroke="#2a2a2e" stroke-width="1"/>
    <text x="375" y="518" text-anchor="middle" fill="#d4d4d8">Points Table</text>

    <rect x="457" y="495" width="136" height="36" rx="8" fill="#1f1f22" stroke="#2a2a2e" stroke-width="1"/>
    <text x="525" y="518" text-anchor="middle" fill="#d4d4d8">Orange Cap</text>

    <rect x="607" y="495" width="136" height="36" rx="8" fill="#1f1f22" stroke="#2a2a2e" stroke-width="1"/>
    <text x="675" y="518" text-anchor="middle" fill="#d4d4d8">Purple Cap</text>

    <rect x="757" y="495" width="136" height="36" rx="8" fill="#1f1f22" stroke="#2a2a2e" stroke-width="1"/>
    <text x="825" y="518" text-anchor="middle" fill="#d4d4d8">Deep Dives</text>
  </g>

  <!-- ── Footer ─────────────────────────────────────────────────────── -->
  <line x1="120" y1="565" x2="1080" y2="565" stroke="#27272a" stroke-width="1"/>
  <text x="465" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#e4e4e7">IPL Analytics Hub</text>
  <text x="623" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="#71717a">·</text>
  <text x="640" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#f97316">iplanalytics.app</text>
</svg>
