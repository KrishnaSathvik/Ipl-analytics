<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="60%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>

  <!-- Left dark panel -->
  <rect x="0" y="0" width="460" height="630" fill="url(#darkBg)"/>
  <!-- Right light panel -->
  <rect x="460" y="0" width="740" height="630" fill="#fafafa"/>
  <!-- Top accent bar on the right panel -->
  <rect x="460" y="0" width="740" height="6" fill="url(#accent)"/>

  <!-- ── Left panel: logo + brand ─────────────────────────────────────── -->

  <!-- Brand logo placeholder — build-brand.mjs replaces {{LOGO_SRC}} with a data URI -->
  <image x="38" y="44" width="124" height="124" xlink:href="{{LOGO_SRC}}" preserveAspectRatio="xMidYMid meet"/>

  <!-- Brand wordmark -->
  <text x="50" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-2">IPL</text>
  <text x="50" y="318" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-2">HUB</text>

  <!-- 2026 accent -->
  <text x="50" y="400" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="#f97316" letter-spacing="-1.5">2026</text>
  <text x="50" y="434" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#a1a1aa" letter-spacing="3">EDITION 19</text>

  <!-- Live badge -->
  <g transform="translate(50, 480)">
    <rect width="130" height="38" rx="19" fill="#16a34a"/>
    <circle cx="20" cy="19" r="5" fill="#ffffff"/>
    <text x="34" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="1.5">LIVE</text>
  </g>

  <!-- ── Right panel: headline + stats grid ─────────────────────────── -->

  <!-- Headline -->
  <text x="500" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="900" fill="#09090b" letter-spacing="-1.5">TATA IPL 2026</text>
  <text x="500" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#71717a">Live points table · deep analytics</text>

  <!-- Divider -->
  <line x1="500" y1="170" x2="1140" y2="170" stroke="#e4e4e7" stroke-width="1.5"/>

  <!-- Stat grid -->
  <!-- Row 1 -->
  <g transform="translate(500, 210)">
    <text x="0" y="46" font-family="system-ui, sans-serif" font-size="56" font-weight="900" fill="#f97316" letter-spacing="-2">74</text>
    <text x="0" y="76" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#52525b" letter-spacing="0.5">MATCHES</text>
  </g>
  <g transform="translate(820, 210)">
    <text x="0" y="46" font-family="system-ui, sans-serif" font-size="56" font-weight="900" fill="#f97316" letter-spacing="-2">10</text>
    <text x="0" y="76" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#52525b" letter-spacing="0.5">TEAMS</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(500, 330)">
    <text x="0" y="46" font-family="system-ui, sans-serif" font-size="56" font-weight="900" fill="#f97316" letter-spacing="-2">18</text>
    <text x="0" y="76" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#52525b" letter-spacing="0.5">SEASONS OF DATA</text>
  </g>
  <g transform="translate(820, 330)">
    <text x="0" y="46" font-family="system-ui, sans-serif" font-size="56" font-weight="900" fill="#f97316" letter-spacing="-2">1,253</text>
    <text x="0" y="76" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#52525b" letter-spacing="0.5">PLAYERS TRACKED</text>
  </g>

  <!-- Tags row -->
  <g font-family="system-ui, sans-serif" font-size="14" font-weight="600">
    <rect x="500" y="465" width="146" height="34" rx="6" fill="#f4f4f5"/>
    <text x="573" y="487" fill="#52525b" text-anchor="middle">Points Table</text>

    <rect x="658" y="465" width="146" height="34" rx="6" fill="#f4f4f5"/>
    <text x="731" y="487" fill="#52525b" text-anchor="middle">Orange Cap</text>

    <rect x="816" y="465" width="146" height="34" rx="6" fill="#f4f4f5"/>
    <text x="889" y="487" fill="#52525b" text-anchor="middle">Purple Cap</text>

    <rect x="974" y="465" width="146" height="34" rx="6" fill="#f4f4f5"/>
    <text x="1047" y="487" fill="#52525b" text-anchor="middle">Deep Dives</text>
  </g>

  <!-- Footer -->
  <line x1="500" y1="540" x2="1140" y2="540" stroke="#e4e4e7" stroke-width="1"/>
  <text x="500" y="578" font-family="system-ui, sans-serif" font-size="15" font-weight="700" fill="#09090b">IPL Analytics Hub</text>
  <text x="672" y="578" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#a1a1aa">·</text>
  <text x="688" y="578" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#f97316">iplanalytics.app</text>
</svg>
