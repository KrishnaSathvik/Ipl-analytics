<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>IPL Analytics Hub 2026 — Live Standings, Stats & 18 Years of Cricket Data</title>

    <!-- Primary SEO -->
    <meta name="description" content="Live IPL 2026 points table, match results, upcoming fixtures, player profiles, and 18 seasons of deep ball-by-ball cricket analytics. The IPL hub cricket fans bookmark." />
    <meta name="keywords" content="IPL 2026, IPL points table, IPL stats, cricket analytics, IPL live scores, IPL schedule, IPL player stats, T20 cricket" />
    <meta name="author" content="IPL Analytics Hub" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://iplanalytics.app/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="IPL Analytics Hub" />
    <meta property="og:title"       content="IPL Analytics Hub 2026 — Live Points Table & Deep Stats" />
    <meta property="og:description" content="Live IPL 2026 standings, Orange Cap, Purple Cap, match results, fixtures & 18 seasons of ball-by-ball analytics. The IPL hub cricket fans bookmark." />
    <meta property="og:image"       content="https://iplanalytics.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url"         content="https://iplanalytics.app/" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="IPL Analytics Hub 2026 — Live Points Table & Deep Stats" />
    <meta name="twitter:description" content="Live IPL 2026 standings, results, fixtures & 18 seasons of deep cricket analytics." />
    <meta name="twitter:image"       content="https://iplanalytics.app/og-image.png" />

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "IPL Analytics Hub",
        "alternateName": "IPL Hub",
        "url": "https://iplanalytics.app/",
        "description": "Live IPL 2026 points table, results and fixtures plus 18 seasons of deep ball-by-ball cricket analytics.",
        "inLanguage": "en",
        "publisher": {
          "@type": "Organization",
          "name": "IPL Analytics Hub",
          "url": "https://iplanalytics.app/"
        }
      }
    </script>

    <!-- Structured data: SportsEvent (current IPL season) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsEvent",
        "name": "Indian Premier League 2026",
        "alternateName": "TATA IPL 2026",
        "sport": "Cricket",
        "startDate": "2026-03-28",
        "endDate": "2026-05-31",
        "eventStatus": "https://schema.org/EventScheduled",
        "eventAttendanceMode": "https://schema.org/MixedEventAttendanceMode",
        "location": {
          "@type": "Country",
          "name": "India"
        },
        "organizer": {
          "@type": "Organization",
          "name": "Board of Control for Cricket in India",
          "url": "https://www.iplt20.com/"
        },
        "url": "https://iplanalytics.app/"
      }
    </script>

    <!-- PWA -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="IPL Hub" />

    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="./icons/icon-144.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-72.png" />

    <!-- Preconnect for Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js')
            .then(function(reg) { console.log('SW registered:', reg.scope); })
            .catch(function(err) { console.log('SW registration failed:', err); });
        });
      }
    </script>
  </body>
</html>
