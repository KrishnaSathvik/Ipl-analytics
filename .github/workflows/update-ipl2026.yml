name: Update IPL 2026 Live Data

on:
  workflow_dispatch:
  schedule:
    # Run daily at 6:00 PM UTC (11:30 PM IST) during IPL season
    - cron: '0 18 * 3-5 *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    # Only run during IPL 2026 season (March 28 - May 31, 2026)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Check API key is configured
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Go to Settings → Secrets and variables → Actions → New repository secret to add it."
            exit 1
          fi

      - name: Run update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/update_2026.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet public/ipl2026.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/ipl2026.json
          git commit -m "chore: update IPL 2026 live data ($(date -u +%Y-%m-%d))"
          git push
